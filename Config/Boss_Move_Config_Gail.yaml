behaviors:
  BossMoveOnly:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 102400      
      learning_rate: 1.0e-5   
      beta: 1.0e-5        
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 0.4
      gail:
        strength: 1.0
        demo_path: D:\Software_Capstone_Design\Demonstration_Directory\BossMoveDemo7.demo
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 2500000
    time_horizon: 64
    summary_freq: 10000
    threaded: false
    self_play: null
    behavioral_cloning: null