behaviors:
  BossMoveOnly:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 102400      
      learning_rate: 5.0e-5
      beta: 5.0e-4       
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
      # vis_encode_type: simple
      # memory:
        # memory_size: 256
        # sequence_length: 64
      # goal_conditioning_type: hyper
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    # init_path: null
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 3000000
    time_horizon: 64
    summary_freq: 10000
    threaded: false
    self_play: null
    behavioral_cloning: null